<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scoundrel</title>
  <script type="module" src="/src/app.ts"></script>
</head>

<body>
  <div x-data="engine" class="engine">
    <div class="info" x-text="health"></div>
    <div class="dungeon">
      <div class="card card--stack"></div>
    </div>

    <div class="room">
      <template x-for="card in room">
        <div class="card" role="button" :class="`card--${card.suit.toLowerCase()}`" x-on:click="pickCard"
          :data-card-id="card.id">
          <div class="card__info">
            <div class="card__name" x-text="card.display"></div>
            <div class="card__suit" x-text="card.suit"></div>
          </div>

          <div class="card__inner">
            <div class="card__actions" x-show="card.suit === 'CLUBS' || card.suit === 'SPADES'">
              <button x-on:click="fightBareHanded">Fight bare handed</button>
              <button x-on:click="fightWithWeapon">Use weapon</button>
            </div>
          </div>

          <div class="card__info">
            <div class="card__suit" x-text="card.suit"></div>
            <div class="card__value" x-text="card.value"></div>
            <div class="card__name" x-text="card.display"></div>
          </div>
        </div>
      </template>
    </div>

    <div class="discard"></div>
    <div class="hand">
      <template x-if="selectedWeapon">
        <div class="card">
          <div class="card__info">
            <div class="card__name" x-text="selectedWeapon.display"></div>
            <div class="card__suit" x-text="selectedWeapon.suit"></div>
          </div>

          <picture class="card__image"></picture>

          <div class="card__info">
            <div class="card__suit" x-text="selectedWeapon.suit"></div>
            <div class="card__name" x-text="selectedWeapon.display"></div>
          </div>
        </div>
      </template>
    </div>
  </div>
</body>

</html>
