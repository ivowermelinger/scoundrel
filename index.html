<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>scoundrel</title>

  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=radio-canada-big:400,600" rel="stylesheet" />

  <style>
    [x-cloak] {
      display: none !important;
    }
  </style>
</head>

<body>
  <div class="engine__warning">
    <p>Turn your device to landscape mode to play.</p>
  </div>

  <div x-cloak x-data="engine" class="engine">
    <dialog class="dialog" x-cloak x-ref="gameOverDialog">
      <h1>Game Over</h1>

      <button x-on:click="restart">Restart</button>
    </dialog>

    <div class="dungeon" x-ref="dungeon">
      <div class="card card--stack">
        <div x-text="$store.gameState.cards.length"></div>
      </div>
    </div>

    <div class="room" x-ref="room">
      <template x-for="card in $store.gameState.room">
        <div class="card card--interactive" role="button" :class="`card--${card.suit.toLowerCase()}`"
          x-on:click="pickCard" :data-card-id="card.id">
          <div class="card__info">
            <div class="card__name" x-text="card.display"></div>
            <div class="card__suit" :style="`mask-image: url(/src/assets/svg/${card.suit.toLowerCase()}.svg)`"></div>
          </div>

          <template x-if="card.image">
            <picture class="card__image">
              <img :src="card.image" alt="">
            </picture>
          </template>

          <div class="card__inner">
            <div class="card__actions" x-show="card.suit === 'CLUBS' || card.suit === 'SPADES'">
              <button x-on:click.stop="fightBareHanded">Fight bare handed</button>
              <button x-show="$store.gameState.selectedWeapon && ($store.gameState.lastSlayedValue === null || $store.gameState.lastSlayedValue >= card.value)"
                x-on:click.stop="fightWithWeapon">Use
                weapon</button>
            </div>
          </div>

          <div class="card__info">
            <div class="card__suit" :style="`mask-image: url(/src/assets/svg/${card.suit.toLowerCase()}.svg)`"></div>
            <div class="card__name" x-text="card.display"></div>
          </div>
        </div>
      </template>
    </div>

    <div class="hand" x-ref="hand">
      <template x-if="$store.gameState.selectedWeapon">
        <div class="card" :class="`card--${$store.gameState.selectedWeapon.suit.toLowerCase()}`">
          <div class="card__info">
            <div class="card__name" x-text="$store.gameState.selectedWeapon.display"></div>
            <div class="card__suit"
              :style="`mask-image: url(/src/assets/svg/${$store.gameState.selectedWeapon.suit.toLowerCase()}.svg)`"></div>
          </div>

          <template x-if="$store.gameState.selectedWeapon.image">
            <picture class="card__image">
              <img :src="$store.gameState.selectedWeapon.image" alt="">
            </picture>
          </template>

          <div class="card__info">
            <div class="card__suit"
              :style="`mask-image: url(/src/assets/svg/${$store.gameState.selectedWeapon.suit.toLowerCase()}.svg)`"></div>
            <div class="card__name" x-text="$store.gameState.selectedWeapon.display"></div>
          </div>
        </div>
      </template>

      <div class="hand__slayed" x-ref="slayed">
        <template x-for="card in $store.gameState.slayedEnemies">
          <div class="card" :class="`card--${card.suit.toLowerCase()}`">
            <div class="card__info">
              <div class="card__name" x-text="card.display"></div>
              <div class="card__suit" :style="`mask-image: url(/src/assets/svg/${card.suit.toLowerCase()}.svg)`"></div>
            </div>

            <template x-if="card.image">
              <picture class="card__image">
                <img :src="card.image" alt="">
              </picture>
            </template>

            <div class="card__info">
              <div class="card__suit" :style="`mask-image: url(/src/assets/svg/${card.suit.toLowerCase()}.svg)`"></div>
              <div class="card__name" x-text="card.display"></div>
            </div>
          </div>
        </template>
      </div>
    </div>

    <div class="discard" x-ref="discard">
      <div class="card card--discard">
        <div x-text="$store.gameState.discardPile.length"></div>
      </div>
    </div>

    <div class="info" x-text="$store.gameState.health"></div>
    <button x-on:click="restart()">Restart</button>
    <button x-show="$store.gameState.room.length === 4 && !$store.gameState.skippedRoom" x-on:click="skipRoom">Skip room</button>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>

</html>
